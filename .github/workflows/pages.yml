name: Deploy to GitHub Pages

# Publishes the WebAssembly UI to GitHub Pages on every push to main.
# The deployed site is static, so the terminal (which needs the native
# tck-server) is unavailable there; AI calls go directly to the provider.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Enables Pages on first run so no manual repo setting is needed.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      # Pages serves the repo at /<repo>/, so assets must be referenced there.
      - name: Build WASM UI
        working-directory: crates/tck-ui
        run: trunk build --release --public-url /keyboard/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: crates/tck-ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
