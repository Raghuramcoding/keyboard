name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build & check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Check workspace (native crates)
        run: cargo clippy -p tck-core -p tck-server -- -D warnings

      - name: Build WASM UI
        working-directory: crates/tck-ui
        run: trunk build --release

      - name: Build native server
        run: cargo build -p tck-server --release
