name: Release

# Cut a release by pushing a v* tag:
#   git tag v3.0.0 && git push origin v3.0.0
# Each OS builds the WASM UI + native server and uploads a bundle that runs
# the whole T.C.K app (open http://127.0.0.1:3000 after launching the server).
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build & publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: tck-windows-x64
            bin: tck-server.exe
          - os: macos-latest
            asset: tck-macos-arm64
            bin: tck-server
          - os: ubuntu-latest
            asset: tck-linux-x64
            bin: tck-server
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Build WASM UI
        working-directory: crates/tck-ui
        run: trunk build --release

      - name: Build native server
        run: cargo build -p tck-server --release

      - name: Stage bundle
        shell: bash
        run: |
          mkdir -p bundle/${{ matrix.asset }}/dist
          cp target/release/${{ matrix.bin }} bundle/${{ matrix.asset }}/
          cp -r crates/tck-ui/dist/* bundle/${{ matrix.asset }}/dist/
          cd bundle && tar -czf ${{ matrix.asset }}.tar.gz ${{ matrix.asset }}

      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          files: bundle/${{ matrix.asset }}.tar.gz
