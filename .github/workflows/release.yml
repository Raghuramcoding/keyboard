name: Release

# Cut a release by bumping the version and pushing a matching v* tag.
# electron-builder publishes to the release named after package.json's version,
# so bump it to match the tag:
#   npm version 2.0.1            # updates package.json + creates the v2.0.1 tag
#   git push origin main --tags  # triggers this workflow -> builds + publishes installers
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      # electron-builder creates/updates the GitHub Release for the pushed tag
      # and uploads the installer + portable exe as assets.
      - name: Build & publish installers
        run: npx electron-builder --win nsis portable --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
